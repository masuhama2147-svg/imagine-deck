<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><link rel="icon" type="image/png" href="assets/logo/favicon.png">
<script>document.documentElement.classList.add('js')</script>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ログイン｜Imagine Deck</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Old+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css?v=7">
<link rel="stylesheet" href="css/layout.css?v=7">
<link rel="stylesheet" href="css/components.css?v=7">
<link rel="stylesheet" href="css/pages.css?v=7">
</head>
<body>
<main id="main" class="l-section">
  <div class="l-container l-container--narrow">
    <p style="text-align:center;margin-bottom:24px">
      <a href="index.html" aria-label="Imagine Deck トップへ"><img src="assets/logo/imagine-deck-logo.png" alt="Imagine Deck" width="125" height="44" style="height:48px;width:auto;display:inline-block"></a>
    </p>
    <div class="c-rules" style="max-width:460px;margin:0 auto">
      <header class="c-rules__head">
        <h2>ログイン</h2>
        <p class="c-rules__intro">登録済みのメールアドレスでログインしてください。</p>
      </header>
      <form id="login-form" novalidate>
        <div class="c-field">
          <label class="c-field__label c-field__label--required" for="email">メールアドレス</label>
          <input class="c-input" type="email" id="email" name="email" required autocomplete="email" inputmode="email" placeholder="you@example.com">
        </div>
        <div class="c-field">
          <label class="c-field__label c-field__label--required" for="password">パスワード</label>
          <input class="c-input" type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <p class="c-error-message" id="login-error" hidden></p>
        <button class="c-button c-button--primary c-button--block c-button--lg" type="submit">ログイン</button>
      </form>
      <div style="margin-top:18px;display:flex;justify-content:space-between;gap:12px;font-size:.9rem;flex-wrap:wrap">
        <a href="signup.html">アカウント新規登録</a>
        <a href="#" id="reset-link">パスワードを忘れた方</a>
      </div>
    </div>
  </div>
</main>
<script type="module">
  import { signIn, resetPassword, authErrorMessage, safeNext } from "./js/auth.js";
  const form = document.getElementById('login-form');
  const err = document.getElementById('login-error');
  const next = safeNext(new URLSearchParams(location.search).get('next'));
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.hidden = true; err.style.color = '';
    const btn = form.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'ログイン中…';
    try {
      await signIn(form.email.value.trim(), form.password.value);
      location.href = next;
    } catch (ex) {
      err.textContent = authErrorMessage(ex.code); err.hidden = false;
      btn.disabled = false; btn.textContent = 'ログイン';
    }
  });
  document.getElementById('reset-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = form.email.value.trim();
    if (!email) { err.textContent = '再設定メールの送信先メールアドレスを入力してください。'; err.hidden = false; return; }
    try {
      await resetPassword(email);
      err.style.color = 'var(--color-success)';
      err.textContent = '再設定メールを送信しました。受信箱をご確認ください。'; err.hidden = false;
    } catch (ex) { err.textContent = authErrorMessage(ex.code); err.hidden = false; }
  });
</script>
</body>
</html>
