<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow">
<script>document.documentElement.classList.add('js')</script>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>新規登録｜Imagine Deck</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Old+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css?v=6">
<link rel="stylesheet" href="css/layout.css?v=6">
<link rel="stylesheet" href="css/components.css?v=6">
<link rel="stylesheet" href="css/pages.css?v=6">
</head>
<body>
<main id="main" class="l-section">
  <div class="l-container l-container--narrow">
    <p style="text-align:center;margin-bottom:24px">
      <a href="index.html" aria-label="Imagine Deck トップへ"><img src="assets/logo/imagine-deck-logo.png" alt="Imagine Deck" width="125" height="44" style="height:48px;width:auto;display:inline-block"></a>
    </p>
    <div class="c-rules" style="max-width:480px;margin:0 auto">
      <header class="c-rules__head">
        <h2>アカウント新規登録</h2>
        <p class="c-rules__intro">大学メール（@*.ehime-u.ac.jp）の方は「大学関係者」として登録されます。</p>
      </header>
      <form id="signup-form" novalidate>
        <div class="c-field">
          <label class="c-field__label c-field__label--required" for="name">お名前 / 団体名</label>
          <input class="c-input" type="text" id="name" name="name" required autocomplete="name" maxlength="60">
        </div>
        <div class="c-field">
          <label class="c-field__label c-field__label--required" for="email">メールアドレス</label>
          <input class="c-input" type="email" id="email" name="email" required autocomplete="email" inputmode="email" placeholder="you@example.com">
        </div>
        <div class="c-field">
          <label class="c-field__label c-field__label--required" for="password">パスワード（6文字以上）</label>
          <input class="c-input" type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
        </div>
        <div class="c-field">
          <label class="c-field__label" for="organization">所属（任意）</label>
          <input class="c-input" type="text" id="organization" name="organization" autocomplete="organization" maxlength="80" placeholder="〇〇研究室 / 株式会社△△ / 〇〇市">
        </div>
        <div class="c-field">
          <label class="c-field__label" for="sector">セクター（学外の方）</label>
          <select class="c-select" id="sector" name="sector">
            <option value="industry">産（産業界・企業）</option>
            <option value="government">官（行政・自治体）</option>
            <option value="other">その他</option>
          </select>
          <p class="c-field-help">大学関係者は自動的に「学（アカデミア）」になります。</p>
        </div>
        <p class="c-error-message" id="signup-error" hidden></p>
        <button class="c-button c-button--primary c-button--block c-button--lg" type="submit">登録する</button>
      </form>
      <p style="margin-top:18px;font-size:.9rem">すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></p>
    </div>
  </div>
</main>
<script type="module">
  import { signUp, authErrorMessage, safeNext } from "./js/auth.js";
  const form = document.getElementById('signup-form');
  const err = document.getElementById('signup-error');
  const next = safeNext(new URLSearchParams(location.search).get('next'));
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.hidden = true; err.style.color = '';
    const btn = form.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = '登録中…';
    try {
      await signUp({
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        password: form.password.value,
        organization: form.organization.value.trim(),
        sector: form.sector.value,
      });
      err.style.color = 'var(--color-success)';
      err.textContent = '登録しました。確認メールを送信しています…';
      err.hidden = false;
      setTimeout(() => location.href = next, 800);
    } catch (ex) {
      err.textContent = authErrorMessage(ex.code); err.hidden = false;
      btn.disabled = false; btn.textContent = '登録する';
    }
  });
</script>
</body>
</html>
