<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ただいま改修中です｜Imagine Deck</title>
<link rel="icon" type="image/png" href="/assets/logo/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Old+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#8b168f; --primary-dark:#6f1173; --primary-soft:#fbf3fc;
    --accent:#f4a93a; --ink:#1b1820; --muted:#6b6570; --line:#ece8ef; --bg:#ffffff;
    --display:"Zen Old Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"Noto Sans JP",system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--bg);
    min-height:100dvh; display:grid; place-items:center; padding:32px 20px;
    line-height:1.85; -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(120% 80% at 50% -10%, var(--primary-soft) 0%, rgba(255,255,255,0) 60%),
      radial-gradient(60% 40% at 110% 110%, rgba(244,169,58,.08) 0%, rgba(255,255,255,0) 70%);
  }
  .card{ width:min(640px,100%); text-align:center; }
  .logo{ height:54px; width:auto; margin:0 auto 40px; display:block; }
  @media(max-width:520px){ .logo{ height:44px; margin-bottom:30px } }
  .eyebrow{ display:inline-flex; align-items:center; gap:9px; font-size:.78rem; letter-spacing:.16em; font-weight:700; color:var(--primary); text-transform:uppercase; margin-bottom:22px; }
  .eyebrow::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px rgba(244,169,58,.18); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.82)} }
  h1{ font-family:var(--display); font-weight:600; color:var(--ink); font-size:clamp(2rem,7vw,3.1rem); line-height:1.3; letter-spacing:.01em; margin-bottom:8px; }
  h1 .accent{ color:var(--primary); }
  .sub-en{ font-family:var(--display); color:var(--muted); font-size:.95rem; letter-spacing:.22em; margin-bottom:28px; }
  p.lead{ color:#433d49; font-size:1.04rem; margin:0 auto 14px; max-width:34em; }
  p.note{ color:var(--muted); font-size:.92rem; margin:0 auto; max-width:32em; }
  .bar{ position:relative; height:5px; width:min(300px,72%); margin:34px auto 6px; background:var(--line); border-radius:99px; overflow:hidden; }
  .bar::after{ content:""; position:absolute; inset:0; width:42%; border-radius:99px; background:linear-gradient(90deg,var(--primary),var(--accent)); animation:slide 1.9s cubic-bezier(.65,.05,.36,1) infinite; }
  @keyframes slide{ 0%{transform:translateX(-110%)} 100%{transform:translateX(330%)} }
  .divider{ width:40px; height:2px; background:var(--accent); margin:40px auto 22px; border:0; }
  footer{ color:var(--muted); font-size:.82rem; letter-spacing:.04em; }
  footer .org{ color:var(--ink); font-weight:500; }
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/assets/logo/imagine-deck-logo.png" alt="Imagine Deck">
    <span class="eyebrow">Renewal in progress</span>
    <h1>ただいま<span class="accent">改修中</span>です</h1>
    <p class="sub-en">UNDER&nbsp;RENOVATION</p>
    <p class="lead">Imagine Deck の予約システムを、より分かりやすく安心してお使いいただけるよう、リニューアル作業を行っています。</p>
    <p class="note">ご不便をおかけしますが、まもなく新しくなって戻ってまいります。今しばらくお待ちください。</p>
    <div class="bar" role="progressbar" aria-label="改修作業中"></div>
    <hr class="divider">
    <footer><span class="org">愛媛大学ミュージアム 交流スペース Imagine&nbsp;Deck</span></footer>
  </main>
</body>
</html>
